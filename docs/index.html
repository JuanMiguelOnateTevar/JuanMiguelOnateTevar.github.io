<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi GitHub Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>

      border-radius: 8px;

    }

      color: #0366d6;
    }

<body>
  <div class="container">

    </p>
    <h2>Enlaces</h2>
    <ul>
      <li><a href="https://github.com/tu-usuario" target="_blank">Mi perfil de GitHub</a></li>
      <li><a href="#proyectos">Ir a proyectos</a></li>

    <h2 id="proyectos">Proyectos</h2>

      Próximamente añadiré una lista de proyectos con enlaces y descripciones.

</html>
